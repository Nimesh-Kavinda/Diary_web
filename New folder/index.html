<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Developer Diary — Nimesh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #22263a;
        --border: #2e3348;
        --text: #e2e8f0;
        --text-muted: #7c8aaa;
        --blue: #3b82f6;
        --blue-soft: #1e3a5f;
        --amber: #f59e0b;
        --amber-soft: #3d2e0a;
        --orange: #f97316;
        --orange-soft: #3d1a06;
        --red: #ef4444;
        --red-soft: #3d0f0f;
        --purple: #a855f7;
        --purple-soft: #2e1a4a;
        --green: #22c55e;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
      }
      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--surface);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3e4a6e;
      }

      /* Sidebar */
      #sidebar {
        width: 200px;
        min-width: 200px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
      }
      .month-link {
        padding: 8px 16px;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 13px;
        border-radius: 6px;
        margin: 2px 8px;
        transition: all 0.15s;
      }
      .month-link:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .month-link.active {
        background: var(--blue-soft);
        color: var(--blue);
        font-weight: 600;
      }

      /* Calendar grid */
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }
      .day-header {
        text-align: center;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        padding: 4px 0;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .day-cell {
        min-height: 72px;
        border-radius: 8px;
        padding: 6px;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.15s;
        position: relative;
        display: flex;
        flex-direction: column;
      }
      .day-cell:hover {
        border-color: var(--blue);
        transform: translateY(-1px);
      }
      .day-cell.empty {
        cursor: default;
        opacity: 0;
        pointer-events: none;
      }
      .day-cell.outside-window {
        opacity: 0;
        pointer-events: none;
      }
      .day-cell.weekend-cell {
        background: transparent;
        cursor: default;
      }
      .day-cell.weekend-cell:hover {
        border-color: transparent;
        transform: none;
      }
      .day-cell.type-work {
        background: var(--blue-soft);
        border-color: #1e3a5f;
      }
      .day-cell.type-generated {
        background: #1e3428;
        border-color: #2d4a3a;
        border-style: dashed;
      }
      .day-cell.type-leave {
        background: var(--orange-soft);
        border-color: #5a2a0a;
      }
      .day-cell.type-holiday {
        background: var(--red-soft);
        border-color: #5a1a1a;
      }
      .day-cell.type-work:hover {
        border-color: var(--blue);
      }
      .day-cell.type-generated:hover {
        border-color: var(--green);
      }
      .day-cell.type-leave:hover {
        border-color: var(--orange);
      }
      .day-cell.type-holiday:hover {
        border-color: var(--red);
      }
      .day-num {
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .day-cell.type-work .day-num {
        color: var(--blue);
      }
      .day-cell.type-generated .day-num {
        color: var(--green);
      }
      .day-cell.type-leave .day-num {
        color: var(--orange);
      }
      .day-cell.type-holiday .day-num {
        color: var(--red);
      }
      .day-cell.weekend-cell .day-num {
        color: var(--text-muted);
      }
      .day-label {
        font-size: 10px;
        line-height: 1.3;
        color: var(--text-muted);
        overflow: hidden;
        flex: 1;
      }
      .day-cell.type-work .day-label {
        color: #93c5fd;
      }
      .day-cell.type-generated .day-label {
        color: #86efac;
      }
      .day-cell.type-leave .day-label {
        color: #fdba74;
      }
      .day-cell.type-holiday .day-label {
        color: #fca5a5;
      }
      .week-tag {
        position: absolute;
        bottom: 4px;
        right: 5px;
        font-size: 9px;
        color: var(--purple);
        font-weight: 700;
        letter-spacing: 0.03em;
      }
      .ai-badge {
        position: absolute;
        top: 4px;
        right: 5px;
        font-size: 9px;
        font-weight: 700;
        color: var(--green);
        background: #0d2a1a;
        padding: 1px 4px;
        border-radius: 3px;
        letter-spacing: 0.03em;
      }

      /* Modal */
      #modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        backdrop-filter: blur(4px);
      }
      #modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        width: 100%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
        padding: 28px;
        position: relative;
      }
      .task-item {
        background: var(--surface2);
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 8px;
        font-size: 14px;
        line-height: 1.6;
        color: #cbd5e1;
        border-left: 3px solid var(--blue);
      }
      .task-item.generated {
        border-left-color: var(--green);
      }
      .task-item.holiday {
        border-left-color: var(--red);
      }
      .task-item.leave {
        border-left-color: var(--orange);
      }

      /* Stats banner */
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 20px;
        flex: 1;
        min-width: 120px;
      }

      /* Week summary card */
      .week-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 12px;
      }

      /* Pulsing dot for today */
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .today-dot {
        width: 6px;
        height: 6px;
        background: var(--blue);
        border-radius: 50%;
        display: inline-block;
        margin-left: 4px;
        animation: pulse 2s infinite;
      }

      /* Tooltip */
      .tooltip {
        position: absolute;
        bottom: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%);
        background: #2a2f45;
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 6px;
        white-space: nowrap;
        pointer-events: none;
        z-index: 50;
        display: none;
      }
      .day-cell:hover .tooltip {
        display: block;
      }
    </style>
  </head>
  <body class="flex" style="background: var(--bg)">
    <!-- Sidebar -->

          <div

            "
          >
            <span
              style="
                width: 12px;
                height: 12px;
                border-radius: 3px;
                background: #1e3428;
                border: 1px dashed #2d4a3a;

            AI-inferred
          </div>
          <div
            style="
              display: flex;

            "

            <span

                width: 12px;
                height: 12px;

                background: var(--orange-soft);
                border: 1px solid #5a2a0a;

              "

          <div

            "
          >
            <span
              style="
                width: 12px;

    <!-- Main -->

    <script>
      // ─────────────────────────────────────────────────────────
      // Utils
      // ─────────────────────────────────────────────────────────
      const MONTH_NAMES = [
        'January',
        'February',
        'March',
        'April',
        'May',
        'June',
        'July',
        'August',
        'September',
        'October',
        'November',
        'December',
      ];
      const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

      function parseDate(s) {
        const [y, m, d] = s.split('-').map(Number);
        return new Date(y, m - 1, d);
      }
      function fmtDate(d) {
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }
      function isWeekendDate(d) {
        const dow = d.getDay();
        return dow === 0 || dow === 6;
      }
      // Monday-first leading offset
      function leadingOffset(year, month) {
        return (new Date(year, month - 1, 1).getDay() + 6) % 7;
      }

      function formatDisplayDate(s) {
        const d = parseDate(s);
        return `${DAY_NAMES[(d.getDay() + 6) % 7]}, ${d.getDate()} ${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
      }

      // ─────────────────────────────────────────────────────────
      // Data load
      // ─────────────────────────────────────────────────────────
      let DATA = null;
      let dayMap = {}; // date string → day entry
      let weekMap = {}; // end-date string → week entry

      async function loadData() {
        try {
          const res = await fetch('./diary-data.json');
          DATA = await res.json();
        } catch (e) {
          document.body.innerHTML = `<div style="padding:40px;color:#ef4444;font-size:16px">
      ⚠ Could not load diary-data.json.<br>
      <small style="color:#7c8aaa">Make sure index.html and diary-data.json are in the same folder and served over HTTP (not file://).</small><br><br>
      <small>Error: ${e.message}</small></div>`;
          return;
        }
        // Build maps
        for (const d of DATA.days) {
          dayMap[d.date] = d;
        }
        for (const w of DATA.weeks || []) {
          weekMap[w.end] = w;
        }
        render();
      }

      // ─────────────────────────────────────────────────────────
      // Stats
      // ─────────────────────────────────────────────────────────
      function computeStats() {
        const days = DATA.days;
        const workDays = days.filter((d) => d.type === 'work').length;
        const genDays = days.filter((d) => d.type === 'generated').length;
        const holidays = days.filter((d) => d.type === 'holiday').length;
        const leaves = days.filter((d) => d.type === 'leave').length;
        const projects = new Set(
          days
            .filter((d) => d.project)
            .flatMap((d) => d.project.split(', ').map((s) => s.trim())),
        ).size;
        const weeks = (DATA.weeks || []).length;
        return { workDays, genDays, holidays, leaves, projects, weeks };
      }

      function buildStats() {
        const s = computeStats();
        const bar = document.getElementById('stats-bar');
        const items = [
          { label: 'Work Days', val: s.workDays, color: 'var(--blue)' },
          { label: 'AI-inferred', val: s.genDays, color: 'var(--green)' },
          { label: 'Holidays', val: s.holidays, color: 'var(--red)' },
          { label: 'Leaves', val: s.leaves, color: 'var(--orange)' },
          { label: 'Projects', val: s.projects, color: 'var(--purple)' },
          { label: 'Weeks', val: s.weeks, color: '#8b5cf6' },
        ];
        bar.innerHTML = items
          .map(
            (i) => `
    <div class="stat-card">
      <div style="font-size:24px;font-weight:800;color:${i.color}">${i.val}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${i.label}</div>
    </div>`,
          )
          .join('');

        const meta = DATA.meta || {};
        const label = document.getElementById('date-range-label');
        if (meta.window_start && meta.window_end) {
          label.textContent = `${formatDisplayDate(meta.window_start)} → ${formatDisplayDate(meta.window_end)}`;
        }
      }

      // ─────────────────────────────────────────────────────────
      // Calendar rendering
      // ─────────────────────────────────────────────────────────
      function getMonthRange() {
        const start = parseDate(DATA.meta.window_start);
        const end = parseDate(DATA.meta.window_end);
        const months = [];
        let cur = new Date(start.getFullYear(), start.getMonth(), 1);
        while (cur <= end) {
          months.push({ year: cur.getFullYear(), month: cur.getMonth() + 1 });
          cur.setMonth(cur.getMonth() + 1);
        }
        return months;
      }

      function buildSidebar(months) {
        const nav = document.getElementById('month-nav');
        nav.innerHTML = months
          .map(
            ({ year, month }) => `
    <div class="month-link" id="nav-${year}-${month}" onclick="scrollToMonth(${year},${month})">
      ${MONTH_NAMES[month - 1].slice(0, 3)} ${year}
    </div>`,
          )
          .join('');
      }

      function scrollToMonth(year, month) {
        const el = document.getElementById(`month-${year}-${month}`);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        document
          .querySelectorAll('.month-link')
          .forEach((l) => l.classList.remove('active'));
        const nav = document.getElementById(`nav-${year}-${month}`);
        if (nav) nav.classList.add('active');
      }

      function buildCalendar() {
        const months = getMonthRange();
        buildSidebar(months);

        const win_start = DATA.meta.window_start;
        const win_end = DATA.meta.window_end;

        let html = '';
        for (const { year, month } of months) {
          html += buildMonth(year, month, win_start, win_end);
        }
        document.getElementById('calendar-body').innerHTML = html;

        // Intersection observer for sidebar active state
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting && e.intersectionRatio > 0.2) {
                const id = e.target.id.replace('month-', '').split('-');
                const year = id[0],
                  month = id[1];
                document
                  .querySelectorAll('.month-link')
                  .forEach((l) => l.classList.remove('active'));
                const nav = document.getElementById(`nav-${year}-${month}`);
                if (nav) nav.classList.add('active');
              }
            });
          },
          { threshold: 0.2 },
        );

        document
          .querySelectorAll('.month-section')
          .forEach((el) => observer.observe(el));
      }

      function buildMonth(year, month, win_start, win_end) {
        const offset = leadingOffset(year, month);
        const daysInMonth = new Date(year, month, 0).getDate();
        const cells = [];

        // leading empty cells
        for (let i = 0; i < offset; i++)
          cells.push('<div class="day-cell empty"></div>');

        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const dateObj = parseDate(dateStr);
          const isWeekend = isWeekendDate(dateObj);
          const inWindow = dateStr >= win_start && dateStr <= win_end;

          if (!inWindow) {
            cells.push('<div class="day-cell outside-window"></div>');
            continue;
          }

          const entry = dayMap[dateStr];
          const weekEntry = weekMap[dateStr]; // is this a week-end date?

          let typeClass = '';
          let label = '';
          let aiFlag = '';
          let tooltip = '';
          let clickable = false;

          if (isWeekend) {
            typeClass = 'weekend-cell';
            label = `<span style="font-size:10px;color:var(--border)">Weekend</span>`;
          } else if (entry) {
            clickable = true;
            if (entry.type === 'holiday') {
              typeClass = 'type-holiday';
              label = `<span>${entry.holiday || 'Holiday'}</span>`;
              tooltip = entry.holiday || 'Holiday';
            } else if (entry.type === 'leave') {
              typeClass = 'type-leave';
              label = `<span>Annual Leave</span>`;
              tooltip = 'Annual Leave';
            } else if (entry.type === 'generated') {
              typeClass = 'type-generated';
              aiFlag = '<span class="ai-badge">AI</span>';
              const proj = entry.project || '';
              label = `<span>${proj}</span>`;
              tooltip = proj;
            } else {
              typeClass = 'type-work';
              const proj = entry.project || '';
              label = `<span>${proj.length > 30 ? proj.slice(0, 28) + '…' : proj}</span>`;
              tooltip = proj;
            }
          } else {
            // weekday in window with no entry
            typeClass = 'weekend-cell';
            label = '';
          }

          const weekTag = weekEntry
            ? `<span class="week-tag">${weekEntry.week}</span>`
            : '';
          const clickAttr = clickable ? `onclick="openDay('${dateStr}')"` : '';
          const tooltipHtml = tooltip
            ? `<span class="tooltip">${tooltip}</span>`
            : '';

          cells.push(`
      <div class="day-cell ${typeClass}" ${clickAttr} title="">
        ${tooltipHtml}
        ${aiFlag}
        <div class="day-num">${d}</div>
        <div class="day-label">${label}</div>
        ${weekTag}
      </div>`);
        }

        return `
    <div class="month-section" id="month-${year}-${month}" style="margin-bottom:48px;scroll-margin-top:20px">
      <h2 style="font-size:18px;font-weight:700;color:var(--text);margin:0 0 16px">
        ${MONTH_NAMES[month - 1]} ${year}
      </h2>
      <div class="cal-grid">
        ${DAY_NAMES.map((n) => `<div class="day-header">${n}</div>`).join('')}
        ${cells.join('')}
      </div>
    </div>`;
      }

      // ─────────────────────────────────────────────────────────
      // Modal
      // ─────────────────────────────────────────────────────────
      function openDay(dateStr) {
        const entry = dayMap[dateStr];
        if (!entry) return;

        const weekEntry = weekMap[dateStr];
        let html = '';

        // Date heading
        const typeLabel =
          {
            work: 'Work Day',
            generated: 'AI-Inferred Day',
            holiday: 'Public Holiday',
            leave: 'Annual Leave',
          }[entry.type] || entry.type;
        const typeColour =
          {
            work: 'var(--blue)',
            generated: 'var(--green)',
            holiday: 'var(--red)',
            leave: 'var(--orange)',
          }[entry.type] || 'var(--text)';

        html += `<div style="margin-bottom:20px">
    <div style="font-size:13px;font-weight:700;color:${typeColour};letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px">${typeLabel}</div>
    <div style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px">${formatDisplayDate(dateStr)}</div>`;

        if (entry.project) {
          html += `<div style="font-size:13px;color:var(--text-muted)">📁 ${entry.project}</div>`;
        }
        html += `</div>`;

        if (entry.type === 'holiday') {
          html += `<div style="background:var(--red-soft);border:1px solid #5a1a1a;border-radius:10px;padding:16px;color:#fca5a5;font-size:15px">
      🎉 ${entry.holiday} — Public Holiday</div>`;
        } else if (entry.type === 'leave') {
          html += `<div style="background:var(--orange-soft);border:1px solid #5a2a0a;border-radius:10px;padding:16px;color:#fdba74;font-size:15px">
      🌴 Annual Leave</div>`;
        } else {
          const tasks = entry.tasks || [];
          const taskClass = entry.type === 'generated' ? 'generated' : '';
          if (tasks.length) {
            html += `<div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em">
          ${entry.type === 'generated' ? '🤖 AI-Inferred Tasks' : '✅ Tasks'}
        </div>`;
            for (const task of tasks) {
              html += `<div class="task-item ${taskClass}">${task}</div>`;
            }
            html += `</div>`;
          }
          if (entry.type === 'generated') {
            html += `<div style="background:#0d2a1a;border:1px solid #1a4a2a;border-radius:8px;padding:10px 14px;font-size:12px;color:#86efac;margin-top:8px">
        ⚠ This day was AI-inferred. No git commits found — tasks were generated from surrounding context. Review and update manually if needed.
      </div>`;
          }
        }

        // Week summary if this is a week-end date
        if (weekEntry) {
          html += `<div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">
      <div style="font-size:13px;font-weight:700;color:var(--purple);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px">
        📅 ${weekEntry.week} Summary
      </div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:6px">
        ${formatDisplayDate(weekEntry.start)} → ${formatDisplayDate(weekEntry.end)}
      </div>
      <div style="font-size:14px;color:var(--text);line-height:1.7;background:var(--surface2);border-radius:10px;padding:14px;border-left:3px solid var(--purple)">
        ${weekEntry.summary}
      </div>
    </div>`;
        }

        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal-overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
      }

      function closeModal(e) {
        if (e && e.target !== document.getElementById('modal-overlay')) return;
        document.getElementById('modal-overlay').style.display = 'none';
        document.body.style.overflow = '';
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          document.getElementById('modal-overlay').style.display = 'none';
          document.body.style.overflow = '';
        }
      });

      // ─────────────────────────────────────────────────────────
      // Weekly Notes view
      // ─────────────────────────────────────────────────────────
      function buildWeeks() {
        const weeks = DATA.weeks || [];
        if (!weeks.length) {
          document.getElementById('weeks-body').innerHTML =
            '<p style="color:var(--text-muted)">No weekly summaries found in diary-data.json.</p>';
          return;
        }
        let html = `<h2 style="font-size:18px;font-weight:700;margin:0 0 24px">Weekly Summaries (${weeks.length} weeks)</h2>`;
        for (const w of weeks) {
          const daysInWeek = DATA.days.filter(
            (d) => d.date >= w.start && d.date <= w.end,
          );
          const workCount = daysInWeek.filter((d) => d.type === 'work').length;
          const projects = [
            ...new Set(
              daysInWeek
                .filter((d) => d.project)
                .flatMap((d) => d.project.split(', ').map((s) => s.trim())),
            ),
          ];
          html += `
      <div class="week-card">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">
          <div>
            <span style="font-size:14px;font-weight:800;color:var(--purple)">${w.week}</span>
            <span style="font-size:13px;color:var(--text-muted);margin-left:12px">${formatDisplayDate(w.start)} → ${formatDisplayDate(w.end)}</span>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <span style="background:var(--blue-soft);color:var(--blue);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">${workCount} work days</span>
            ${projects
              .slice(0, 3)
              .map(
                (p) =>
                  `<span style="background:var(--surface2);color:var(--text-muted);padding:3px 10px;border-radius:20px;font-size:11px">${p}</span>`,
              )
              .join('')}
            ${projects.length > 3 ? `<span style="background:var(--surface2);color:var(--text-muted);padding:3px 10px;border-radius:20px;font-size:11px">+${projects.length - 3} more</span>` : ''}
          </div>
        </div>
        <p style="font-size:14px;line-height:1.75;color:#cbd5e1;margin:0">${w.summary}</p>
      </div>`;
        }
        document.getElementById('weeks-body').innerHTML = html;
      }

      // ─────────────────────────────────────────────────────────
      // Leaves & Holidays view
      // ─────────────────────────────────────────────────────────
      function buildLeaves() {
        const holidays = DATA.days.filter((d) => d.type === 'holiday');
        const leaves = DATA.days.filter((d) => d.type === 'leave');
        let html = '';

        html += `<h2 style="font-size:18px;font-weight:700;margin:0 0 24px">Leaves &amp; Public Holidays</h2>`;

        if (holidays.length) {
          html += `<h3 style="font-size:14px;font-weight:700;color:var(--red);margin:0 0 12px;text-transform:uppercase;letter-spacing:0.05em">Public Holidays (${holidays.length})</h3>`;
          html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:32px">`;
          for (const h of holidays) {
            html += `<div style="background:var(--red-soft);border:1px solid #5a1a1a;border-radius:10px;padding:14px 18px">
        <div style="font-size:13px;font-weight:700;color:var(--red)">${h.holiday}</div>
        <div style="font-size:12px;color:#fca5a5;margin-top:4px">${formatDisplayDate(h.date)}</div>
      </div>`;
          }
          html += `</div>`;
        }

        if (leaves.length) {
          html += `<h3 style="font-size:14px;font-weight:700;color:var(--orange);margin:0 0 12px;text-transform:uppercase;letter-spacing:0.05em">Annual Leave (${leaves.length} day${leaves.length !== 1 ? 's' : ''})</h3>`;
          html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">`;
          for (const l of leaves) {
            html += `<div style="background:var(--orange-soft);border:1px solid #5a2a0a;border-radius:10px;padding:14px 18px">
        <div style="font-size:13px;font-weight:700;color:var(--orange)">Annual Leave</div>
        <div style="font-size:12px;color:#fdba74;margin-top:4px">${formatDisplayDate(l.date)}</div>
      </div>`;
          }
          html += `</div>`;
        }

        if (!holidays.length && !leaves.length) {
          html += `<p style="color:var(--text-muted)">No leaves or holidays found.</p>`;
        }

        document.getElementById('leaves-body').innerHTML = html;
      }

      // ─────────────────────────────────────────────────────────
      // View switching
      // ─────────────────────────────────────────────────────────
      function showView(view) {
        ['calendar', 'weeks', 'leaves'].forEach((v) => {
          document.getElementById(`view-${v}`).style.display =
            v === view ? 'block' : 'none';
          const btn = document.getElementById(`btn-${v}`);
          if (btn) {
            if (v === view) {
              btn.style.background = 'var(--blue-soft)';
              btn.style.borderColor = 'var(--blue)';
              btn.style.color = 'var(--blue)';
            } else {
              btn.style.background = 'transparent';
              btn.style.borderColor = 'var(--border)';
              btn.style.color = 'var(--text-muted)';
            }
          }
        });

        // Sidebar visibility
        document.getElementById('sidebar').style.display =
          view === 'calendar' ? 'flex' : 'none';
      }

      // ─────────────────────────────────────────────────────────
      // Main render
      // ─────────────────────────────────────────────────────────
      function render() {
        buildStats();
        buildCalendar();
        buildWeeks();
        buildLeaves();
      }

      loadData();
    </script>
  </body>
</html>
